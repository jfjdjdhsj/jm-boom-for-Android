name: Android Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example v0.0.1'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: true

env:
  PRODUCT_NAME: JM-Boom
  ANDROID_BUILD_TOOLS_VERSION: '35.0.0'
  ANDROID_NDK_VERSION: '27.2.12479018'

jobs:
  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-22.04
    outputs:
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate release inputs
        id: release
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            tag="$INPUT_TAG"
          else
            tag="$GITHUB_REF_NAME"
          fi

          if ! echo "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$'; then
            echo "Release tag must look like v0.0.1, got: $tag" >&2
            exit 1
          fi

          version="${tag#v}"
          package_version="$(jq -r '.version' package.json)"
          tauri_version="$(jq -r '.version' src-tauri/tauri.conf.json)"
          cargo_version="$(awk -F' = ' '/^version = / { gsub(/"/, "", $2); print $2; exit }' src-tauri/Cargo.toml)"
          lock_version="$(awk '$0 == "name = \"jm-boom\"" { found=1; next } found && /^version = / { gsub(/"/, "", $3); print $3; exit }' src-tauri/Cargo.lock)"

          if [ "$package_version" != "$version" ] || [ "$tauri_version" != "$version" ] || [ "$cargo_version" != "$version" ] || [ "$lock_version" != "$version" ]; then
            echo "Version mismatch for $tag" >&2
            echo "package.json: $package_version" >&2
            echo "src-tauri/tauri.conf.json: $tauri_version" >&2
            echo "src-tauri/Cargo.toml: $cargo_version" >&2
            echo "src-tauri/Cargo.lock: $lock_version" >&2
            exit 1
          fi

          test -f "docs/release-notes/$tag.md"
          for section in "功能" "优化" "修复" "其他"; do
            if ! grep -q "^## $section" "docs/release-notes/$tag.md"; then
              echo "docs/release-notes/$tag.md must contain section: ## $section" >&2
              exit 1
            fi
          done

          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            git fetch --tags --force
            if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
              tag_sha="$(git rev-list -n 1 "$tag")"
              if [ "$tag_sha" != "$GITHUB_SHA" ]; then
                echo "Tag already exists at a different commit: $tag" >&2
                echo "tag: $tag_sha" >&2
                echo "current: $GITHUB_SHA" >&2
                exit 1
              fi
              echo "Tag already exists at current commit: $tag"
            else
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git tag "$tag" "$GITHUB_SHA"
              git push origin "refs/tags/$tag"
            fi
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  build-android:
    name: Build Android APK
    runs-on: ubuntu-22.04
    needs: prepare-release
    env:
      RUSTFLAGS: -D warnings
      ANDROID_KEY_BASE64: ${{ secrets.ANDROID_KEY_BASE64 }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        run: |
          set -euxo pipefail
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;${ANDROID_BUILD_TOOLS_VERSION}" \
            "ndk;${ANDROID_NDK_VERSION}"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"
          echo "NDK_HOME=$ANDROID_HOME/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Validate Android signing secrets
        run: |
          set -euo pipefail
          for secret_name in ANDROID_KEY_BASE64 ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!secret_name}" ]; then
              echo "$secret_name is required for signed release APKs" >&2
              exit 1
            fi
          done

      - name: Install frontend deps
        run: bun install --frozen-lockfile

      - name: Frontend lint
        run: |
          set -euxo pipefail
          bun run lint

      - name: Initialize Tauri Android project
        run: |
          set -euxo pipefail
          if [ ! -d src-tauri/gen/android ]; then
            CI=true bun run tauri android init
          fi

      - name: Build split APKs
        run: |
          set -euxo pipefail
          bun run tauri android build --apk --split-per-abi \
            --target aarch64 \
            --target armv7 \
            --target i686 \
            --target x86_64

      - name: Sign and rename APKs
        env:
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p release-assets

          keystore="$RUNNER_TEMP/android-release.jks"
          printf '%s' "$ANDROID_KEY_BASE64" | base64 --decode > "$keystore"

          apksigner="$ANDROID_HOME/build-tools/${ANDROID_BUILD_TOOLS_VERSION}/apksigner"
          zipalign="$ANDROID_HOME/build-tools/${ANDROID_BUILD_TOOLS_VERSION}/zipalign"

          while IFS= read -r apk; do
            case "$apk" in
              */arm64/*|*arm64-v8a*|*aarch64*) arch="arm64-v8a" ;;
              */arm/*|*armeabi-v7a*|*armv7*) arch="armeabi-v7a" ;;
              */x86_64/*|*x86_64*) arch="x86_64" ;;
              */x86/*|*x86*) arch="x86" ;;
              *) continue ;;
            esac

            aligned="$RUNNER_TEMP/${PRODUCT_NAME}-${arch}-aligned.apk"
            dest="release-assets/${PRODUCT_NAME}-${arch}-${RELEASE_TAG}.apk"
            "$zipalign" -p -f 4 "$apk" "$aligned"
            "$apksigner" sign \
              --ks "$keystore" \
              --ks-key-alias "$ANDROID_KEY_ALIAS" \
              --ks-pass "pass:$ANDROID_KEY_PASSWORD" \
              --key-pass "pass:$ANDROID_KEY_PASSWORD" \
              --out "$dest" \
              "$aligned"
            "$apksigner" verify --verbose "$dest"
          done < <(find src-tauri/gen/android/app/build/outputs/apk -type f -name '*.apk' | sort)

          apk_count="$(find release-assets -type f -name '*.apk' | wc -l | tr -d ' ')"
          if [ "$apk_count" != "4" ]; then
            echo "Expected 4 signed APKs, got $apk_count" >&2
            find src-tauri/gen/android/app/build/outputs/apk -type f -name '*.apk' -print >&2
            exit 1
          fi

      - name: Upload Android release assets to workflow
        uses: actions/upload-artifact@v7
        with:
          name: release-assets-android
          path: release-assets/*.apk
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs:
      - prepare-release
      - build-android
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}

      - name: Download Android release assets
        uses: actions/download-artifact@v8
        with:
          name: release-assets-android
          path: release-assets

      - name: Ensure release notes
        run: test -f "docs/release-notes/${{ needs.prepare-release.outputs.tag }}.md"

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          name: JM Boom Android ${{ needs.prepare-release.outputs.tag }}
          body_path: docs/release-notes/${{ needs.prepare-release.outputs.tag }}.md
          prerelease: false
          files: release-assets/*.apk
